# /etc/nginx/sites-available/spclizenita.codewave.com.bo
# Luego: ln -s /etc/nginx/sites-available/spclizenita.codewave.com.bo /etc/nginx/sites-enabled/

# Redirigir todo HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name spclizenita.codewave.com.bo;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spclizenita.codewave.com.bo;

    # Certificados Let's Encrypt (generados con certbot)
    ssl_certificate     /etc/letsencrypt/live/spclizenita.codewave.com.bo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spclizenita.codewave.com.bo/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Tamaño máximo de upload (logos, imágenes)
    client_max_body_size 10M;

    # ── API → Node.js backend ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploads → Node.js (archivos estáticos del backend) ─────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache de imágenes en el navegador: 30 días
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Frontend React (SPA) ────────────────────────────────────────────
    root /var/www/restaurante/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets del build (Vite genera hashes en el nombre)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker: nunca cachear
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
