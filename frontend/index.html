<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Restaurante</title>
    <!-- Anti-flash: aplica el modo oscuro antes de que React cargue -->
    <script>
      try {
        const stored = JSON.parse(localStorage.getItem('theme') || '{}');
        const modo = stored?.state?.modo;
        if (modo === 'dark' || (!modo && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
